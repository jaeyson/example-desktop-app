name: Windows Release Build

on:
  # push:
  #   tags:
  #     - 'v*' # Triggers when you push a tag like v1.0.0
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: windows-latest

    env:
      MIX_ENV: prod
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

    - name: Set up Elixir
      uses: erlef/setup-beam@fc68ffb90438ef2936bbb3251622353b3dcb2f93
      with:
        elixir-version: '1.17'
        otp-version: '27'

    - name: Install Zig
      uses: goto-bus-stop/setup-zig@v2
      with:
        version: 0.15.2

    - name: Install XZ and 7zip
      shell: powershell
      run: |
        choco install 7zip -y
        ridk exec pacman -S --noconfirm xz
        echo "C:\msys64\usr\bin" >> $env:GITHUB_PATH

    - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
      with:
        path: |
          deps
          _build
        key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
        restore-keys: |
          ${{ runner.os }}-mix-

    - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          src-tauri/target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Install Dependencies
      run: |
        $env:MIX_ENV = "prod"
        mix local.rebar --force
        mix local.hex --force
        mix deps.get
        mix compile
        mix assets.deploy 

    - name: Build Desktop App
      shell: pwsh
      run: |
        $env:MIX_ENV = "prod"
        # We run the build and catch the error so the workflow continues
        try {
            mix ex_tauri.build
        } catch {
            Write-Host "Caught expected ex_tauri copy error, continuing..."
        }

    - name: Package Release
      shell: pwsh
      run: |
        # List files just to be 100% sure of the name in the logs
        Get-ChildItem -Path "burrito_out/"
        
        # Zip the actual binary found in burrito_out
        # Use the underscore name: desktop_x86_64-pc-windows-msvc.exe
        Compress-Archive -Path "burrito_out/desktop_x86_64-pc-windows-msvc.exe" -DestinationPath "desktop-windows-x64.zip"

    - name: Create Release and Upload Asset
      uses: softprops/action-gh-release@v1
      with:
        # Ensure the tag matches your triggering event
        files: desktop-windows-x64.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
